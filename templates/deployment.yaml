apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-api-app.fullname" . }}
  labels:
    {{- include "node-api-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "node-api-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-api-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.initContainer.enabled }}
      initContainers:
        - name: preflight-validator
          image: {{ .Values.initContainer.image }}
          envFrom:
            - configMapRef:
                name: {{ include "node-api-app.fullname" . }}-config
          command:
            - sh
            - -c
            - |
              echo 'Running pre-flight configuration validation...'
              FAILED=0
              for VAR in DB_HOST API_KEY APP_PORT; do
                val=$(eval echo \$$VAR)
                if [ -z "$val" ]; then
                  echo "ERROR: Required variable $VAR is MISSING or empty!"
                  FAILED=1
                else
                  echo "OK: $VAR = $val"
                fi
              done
              if [ $FAILED -eq 1 ]; then
                echo 'Pre-flight FAILED — blocking app startup'
                exit 1
              fi
              echo 'All checks PASSED — starting application'
      {{- end }}

      containers:
        - name: node-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - -e
            - |
              const h=require("http");
              const port=process.env.APP_PORT || 3000;
              const env=process.env.ENVIRONMENT || "unknown";
              h.createServer((q,r)=>{
                r.writeHead(200, {"Content-Type":"text/plain"});
                r.end("API OK: " + env);
              }).listen(port, () => console.log(`Server running on ${port}`));
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "node-api-app.fullname" . }}-config
          resources:
            {{- toYaml .Values.resources | nindent 12 }}