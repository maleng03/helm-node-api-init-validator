apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "node-api-app.fullname" . }}-config
data:
  DB_HOST: {{ .Values.appConfig.dbHost | quote }}
  API_KEY: {{ .Values.appConfig.apiKey | quote }}
  APP_PORT: {{ .Values.appConfig.appPort | quote }}
  ENVIRONMENT: {{ .Values.appConfig.environment | quote }}